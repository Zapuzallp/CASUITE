<script>
    // Particle and Preloader Logic
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const particleCount = 40;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 3 + 1;
            this.speedX = Math.random() * 1 - 0.5;
            this.speedY = Math.random() * 1 - 0.5;
            this.opacity = Math.random() * 0.5 + 0.1;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0;
            if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0;
            if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = `rgba(0, 107, 255, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < particleCount; i++) { particles.push(new Particle()); }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    initParticles();
    animateParticles();

    (function () {
        const progressCircle = document.getElementById('progress-circle');
        const percentageText = document.getElementById('percentage-text');
        const circumference = 2 * Math.PI * 70;
        let currentPercent = 0;

        function updateProgress(percent) {
            const offset = circumference - (percent / 100 * circumference);
            progressCircle.style.strokeDashoffset = offset;
            percentageText.innerText = Math.floor(percent) + '%';
        }

        const loadingInterval = setInterval(() => {
            if (currentPercent < 92) {
                currentPercent += (Math.random() * 5);
                if (currentPercent > 92) currentPercent = 92;
                updateProgress(currentPercent);
            }
        }, 200);

        window.addEventListener('load', () => {
            clearInterval(loadingInterval);
            updateProgress(100);
            setTimeout(() => {
                const preloader = document.getElementById('preloader');
                preloader.style.opacity = '0';
                document.body.classList.remove('loading');
                setTimeout(() => { preloader.remove(); }, 800);
            }, 500);
        });
    })();

</script>

<script>

        const datatableClasses = ['.datatable1', '.datatable-export'];
        datatableClasses.forEach(selector => {
            $(selector).each(function () {
                if ($.fn.DataTable.isDataTable(this)) return;
                $(this).DataTable({
                    responsive: true,
                    processing: true,
                    dom: '<"dt-top"fB>rt<"dt-bottom"lip>',
                    buttons: ['csv', 'excel', 'print']
                });
            });
        });
    });
</script>
